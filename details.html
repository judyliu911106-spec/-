<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花費明細</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <div class="glass-panel text-center">
            <h2 class="panel-title">🔍 篩選花費總計</h2>
            <div class="total-amount" style="color: #ff1493;">NT$ <span id="filter-total">0</span></div>
        </div>

        <div class="glass-panel filter-box">
            <input type="date" id="filter-date" onchange="applyFilter()">
            <select id="filter-cat" onchange="applyFilter()">
                <option value="">所有分類</option>
                <option value="主食">🍱 主食</option><option value="點心">🍰 點心</option>
                <option value="住宿">🎀 住宿</option><option value="交通">🚗 交通</option>
                <option value="購物">🛍️ 購物</option><option value="治裝">👗 治裝</option>
                <option value="電話及會員">📱 電話會員</option><option value="醫療">🏥 醫療</option>
                <option value="保養美體">💅 保養美體</option><option value="儲值及娛樂">🎮 娛樂儲值</option>
                <option value="狗勾">🐶 狗勾</option><option value="其他">✨ 其他</option>
            </select>
        </div>

        <div class="scrollable-content" id="records-list">
            <p style="text-align:center; color:#7a6e71; padding-top: 20px;">正在從 Google 讀取明細中...🌸</p>
        </div>

        <div class="nav-bar">
            <a href="index.html" class="nav-item">記帳首頁</a>
            <a href="details.html" class="nav-item active">明細歷史</a>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbysT5brkEOmCNvDw_LWeesJlDLr-W_jH9DzK2itaa_6oeMdq27w0_rHvUfD_t0QTyW8/exec"; 
        let allRecords = [];

        window.addEventListener('load', () => {
            loadData();
        });

        function loadData() {
            document.getElementById('records-list').innerHTML = `<p style="text-align:center; color:#7a6e71; padding-top: 20px;">正在更新資料中...🌸</p>`;
            fetch(`${GAS_URL}?action=getData`)
                .then(res => res.json())
                .then(data => {
                    allRecords = data.records;
                    applyFilter();
                });
        }

        function applyFilter() {
            const dateVal = document.getElementById('filter-date').value;
            const catVal = document.getElementById('filter-cat').value;
            const container = document.getElementById('records-list');
            container.innerHTML = "";

            let filtered = allRecords.filter(r => {
                const matchDate = dateVal ? r.date === dateVal : true;
                const matchCat = catVal ? r.category === catVal : true;
                return matchDate && matchCat;
            });

            let sum = filtered.reduce((total, r) => total + r.amount, 0);
            document.getElementById('filter-total').innerText = sum.toLocaleString();

            if(filtered.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#7a6e71; padding:20px;">沒有找到帳目唷 ✨</p>`;
                return;
            }

            // 由新到舊排序歷史紀錄
            filtered.reverse().forEach(r => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'record-item';
                itemDiv.style.display = 'flex';
                itemDiv.style.justifyContent = 'space-between';
                itemDiv.style.alignItems = 'center';
                itemDiv.style.boxShadow = '0 4px 12px rgba(255,182,193,0.15)';
                itemDiv.style.border = '1px solid rgba(255,255,255,0.5)';
                
                itemDiv.innerHTML = `
                    <div style="flex: 1;">
                        <span style="font-weight:600; color:#ff4500; font-size:14px;">${r.category}</span> 
                        <span style="color:#555; margin-left:6px; font-size:14px;">${r.item || '(無項目)'}</span>
                        <div style="font-size:11px; color:#999; margin-top:4px;">${r.date}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="font-weight:700; color:#ff1493; font-size:17px;">$${r.amount.toLocaleString()}</div>
                        <button class="delete-btn" onclick="deleteItem(${r.rowId}, '${r.date}', ${r.amount})">🗑️</button>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }

        // 刪除功能
        function deleteItem(rowId, date, amount) {
            if (confirm(`確定要刪除這筆 $${amount} 的紀錄嗎？🌸`)) {
                fetch(`${GAS_URL}?action=deleteRecord&rowId=${rowId}&date=${date}&amount=${amount}`)
                    .then(res => res.json())
                    .then(res => {
                        if (res.status === "success") {
                            alert("已成功刪除該筆帳目！✨");
                            loadData(); // 重新載入最新資料
                        } else {
                            alert("刪除失敗：" + res.message);
                        }
                    }).catch(err => {
                        alert("連線失敗，請稍後再試！");
                        console.error(err);
                    });
            }
        }
    </script>
</body>
</html>
